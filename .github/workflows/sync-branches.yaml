name: Sync Branches

on:
  workflow_dispatch:
    inputs:
      source:
        description: "From:"
        required: true
        type: string
      target:
        description: "To:"
        required: true
        type: string
  workflow_call:
    inputs:
      source:
        description: "From:"
        required: true
        type: string
      target:
        description: "To:"
        required: true
        type: string
env:
  SOURCE_BRANCH: ${{ inputs.source }}
  TARGET_BRANCH: ${{ inputs.target }}

jobs:
  sync-branches:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Set up Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Merge source branch into target and push
      run: |
        set -e

        # Fetch and checkout target branch
        git fetch origin "$TARGET_BRANCH:$TARGET_BRANCH"
        git checkout "$TARGET_BRANCH"

        # Run shared merge script (exit 10 = nothing to commit)
        set +e
        bash "$GITHUB_WORKSPACE/.github/scripts/merge-source-into-head.sh"
        ec=$?
        set -e

        if [[ $ec -eq 0 ]]; then
          git push origin "$TARGET_BRANCH"
        elif [[ $ec -eq 10 ]]; then
          echo "No changes to commit. Skipping push."
          exit 0
        else
          exit "$ec"
        fi
