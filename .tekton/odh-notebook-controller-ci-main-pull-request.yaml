apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/opendatahub-io/kubeflow?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/pull_request_number: '{{pull_request_number}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "true"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "pull_request" && target_branch
      == "main" && ( "components/***".pathChanged() || ".tekton/odh-notebook-controller-ci-main-pull-request.yaml".pathChanged()
      )
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: odh-kubeflow-main
    appstudio.openshift.io/component: odh-notebook-controller-ci-main
    pipelines.appstudio.openshift.io/type: build
  name: odh-notebook-controller-ci-main-on-pull-request
  namespace: open-data-hub-tenant
spec:
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/opendatahub/odh-notebook-controller:on-pr-{{revision}}
  - name: image-expires-after
    value: 5d
  - name: dockerfile
    value: odh-notebook-controller/Dockerfile
  - name: path-context
    value: components
  - name: additional-tags
    value:
    - 'on-pr-{{revision}}'
  - name: pipeline-type
    description: "The type of pipeline to run - we can't use push to avoid triggering trigger-operator-build task in a referenced pipeline"
    value: custom
  - name: enable-group-testing
    value: "false"
  - name: build-source-image
    value: "false"
  - name: skip-checks
    value: "true"
  - name: enable-slack-failure-notification
    value: "false"
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/opendatahub-io/odh-konflux-central.git
    - name: revision
      value: main
    - name: pathInRepo
      value: pipeline/multi-arch-container-build.yaml
  taskRunTemplate:
    serviceAccountName: build-pipeline-odh-notebook-controller-ci-main
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
